name: Cleanup old GHCR versions

on:
  schedule:
    - cron: '0 3 * * 3'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Delete old container versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: spotted-arms
          package-type: container
          min-versions-to-keep: 30
